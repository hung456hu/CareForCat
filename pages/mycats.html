<!-- ===== MY CATS (Owner) ===== -->
<div class="page" id="page-mycats">
  <div class="page-container">
    <div class="section-header">
      <h2 class="section-title">My Cats 🐱</h2>
      <button class="card-btn" onclick="openModal('addCat')">+ Add Cat</button>
    </div>

    <!-- Mochi -->
    <div class="cat-profile" style="background:linear-gradient(135deg,#FDF8F3,white);">
      <div class="cat-avatar card-img-sand">🐈</div>
      <div class="cat-info" style="flex:1">
        <h3>Mochi</h3>
        <div class="cat-breed">British Shorthair · 3 years old · Male</div>
        <div class="cat-stats">
          <div class="cat-stat"><div class="val">4.2 kg</div><div class="lbl">Weight</div></div>
          <div class="cat-stat"><div class="val">2 months</div><div class="lbl">Last Visit</div></div>
          <div class="cat-stat"><div class="val">Good</div><div class="lbl">Health</div></div>
        </div>
        <div class="health-bar-wrap">
          <div class="health-bar-label"><span>Overall Health</span><span>85%</span></div>
          <div class="health-bar"><div class="health-bar-fill" style="width:85%"></div></div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;align-self:flex-start;">
        <button class="card-btn">View Profile</button>
        <button class="card-btn" style="background:var(--soft-green)">Book Appointment</button>
      </div>
    </div>

    <!-- Butter -->
    <div class="cat-profile">
      <div class="cat-avatar card-img-rose">🐱</div>
      <div class="cat-info" style="flex:1">
        <h3>Butter</h3>
        <div class="cat-breed">Ragdoll · 1.5 years old · Female</div>
        <div class="cat-stats">
          <div class="cat-stat"><div class="val">3.1 kg</div><div class="lbl">Weight</div></div>
          <div class="cat-stat"><div class="val">3 weeks</div><div class="lbl">Last Visit</div></div>
          <div class="cat-stat"><div class="val">Excellent</div><div class="lbl">Health</div></div>
        </div>
        <div class="health-bar-wrap">
          <div class="health-bar-label"><span>Overall Health</span><span>94%</span></div>
          <div class="health-bar"><div class="health-bar-fill" style="width:94%"></div></div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;align-self:flex-start;">
        <button class="card-btn">View Profile</button>
        <button class="card-btn" style="background:var(--soft-green)">Book Appointment</button>
      </div>
    </div>
  </div>
</div>
